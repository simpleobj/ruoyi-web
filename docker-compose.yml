version: '3.8'

services:
  # ==================== RuoYi-AI 前端服务 ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # 后端 API 地址 - 构建时传入
        VITE_API_URL: http://127.0.0.1:6039
    container_name: ruoyi-ai-web
    restart: always
    ports:
      - "5137:5137"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ruoyi-net

# ==================== 网络配置 ====================
networks:
  ruoyi-net:
    driver: bridge
